name: Release

# Build & push the production image to GHCR on every main push (and version
# tags). QNAP pulls it via Watchtower — no build on the NAS, no inbound access.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

# Ordered releases: a slow older run must never finish AFTER a newer one and
# overwrite :latest with stale code. Newer pushes cancel in-flight builds.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff lint
        run: uv run ruff check app/ scripts/ tests/

      - name: Ruff format check
        run: uv run ruff format --check app/ scripts/ tests/

      - name: Bandit security scan
        run: uv run bandit -c pyproject.toml -r app/

      - name: Tests
        run: uv run pytest -q

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=sha-${{ steps.sha.outputs.short }}
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GIT_SHA versions the PWA cache — every deploy busts stale CSS/JS.
          build-args: |
            GIT_SHA=${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
